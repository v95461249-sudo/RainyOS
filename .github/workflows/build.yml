name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Android SDK Dependencies
      run: |
        # Игнорируем ошибку 100, если какое-то зеркало Ubuntu временно недоступно
        sudo apt-get update || true
        # Ставим пакеты с флагом восстановления пропущенных ссылок
        sudo apt-get install -y --fix-missing libsqlite3-dev lld dtrace-cmd libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev python3-pip
        pip3 install --user --upgrade buildozer cython virtualenv

    - name: Build Android APK with Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        # Автоматически принимаем все лицензии Google Android SDK
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RainyOS-APK
        path: .buildozer/android/app/build/outputs/apk/debug/*.apk
